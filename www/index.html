<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tiny Towers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      font-family: 'Courier New', monospace;
      color: #fff;
      padding: 8px;
      overflow-x: hidden;
    }

    .screen { width: 100%; display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* ── Stage Select ── */
    #screen-select { min-height: 80dvh; justify-content: center; gap: 20px; }
    #screen-select h2 {
      font-size: clamp(1rem, 4vw, 1.8rem);
      color: #4af; letter-spacing: 4px; text-transform: uppercase;
    }
    #screen-select .subtitle { font-size: clamp(0.7rem, 2vw, 0.85rem); color: #888; }
    #stage-cards { display: flex; flex-direction: column; gap: 24px; width: 100%; }
    .stage-section-title {
      font-size: clamp(0.7rem, 2.5vw, 0.9rem);
      color: #fa4; letter-spacing: 3px; text-transform: uppercase;
      border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 10px;
    }
    .stage-section-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); }
    .stage-card {
      padding: 10px 8px;
      border: 2px solid #444; border-radius: 8px;
      background: #131a2a; cursor: pointer;
      text-align: center; transition: all 0.15s; user-select: none;
    }
    .stage-card:not(.locked):hover { border-color: #4af; background: #1a2a3a; }
    .stage-card.cleared { border-color: #4fa; }
    .stage-card.locked { opacity: 0.45; cursor: default; pointer-events: none; }
    .stage-card .card-num { font-size: 0.6rem; color: #888; margin-bottom: 3px; letter-spacing: 1px; }
    .stage-card .card-icon { font-size: 1.35rem; margin-bottom: 5px; }
    .stage-card .card-name { font-size: 0.82rem; color: #fff; font-weight: bold; margin-bottom: 5px; }
    .stage-card .card-meta { font-size: 0.6rem; color: #adf; line-height: 1.6; }
    .stage-card .card-best { font-size: 0.6rem; color: #4fa; margin-top: 4px; }
    .stage-card .card-lock-label { font-size: 0.58rem; color: #666; margin-top: 3px; }
    .stage-card.coming-soon {
      opacity: 0.5; cursor: default; pointer-events: none;
      border-color: #333; border-style: dashed;
    }
    .stage-card.coming-soon .card-icon { opacity: 0.6; }
    .stage-card.coming-soon .card-name { color: #777; letter-spacing: 1px; }

    /* ── Result Screen ── */
    #screen-result { min-height: 80dvh; justify-content: center; gap: 16px; text-align: center; }
    #screen-result h2 { font-size: clamp(1.2rem, 5vw, 2rem); letter-spacing: 3px; }
    #screen-result h2.win { color: #4fa; }
    #screen-result h2.lose { color: #f44; }
    .result-info { font-size: clamp(0.85rem, 2.5vw, 1rem); color: #adf; }
    .result-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .result-btn {
      padding: 10px 22px; min-height: 44px;
      border: 2px solid #4af; background: #1a3a5a; color: #4af;
      cursor: pointer; font-family: inherit;
      font-size: clamp(0.78rem, 2.3vw, 0.9rem);
      border-radius: 6px; transition: all 0.15s; white-space: nowrap;
    }
    .result-btn:hover { background: #2a5a8a; }
    .result-btn.green { border-color: #4fa; color: #4fa; background: #1a3a2a; }
    .result-btn.green:hover { background: #2a5a3a; }

    /* ── Game Screen ── */
    h1 {
      font-size: clamp(0.9rem, 3vw, 1.4rem);
      letter-spacing: clamp(1px, 1vw, 4px);
      color: #4af; margin-bottom: 6px; text-transform: uppercase;
    }
    #ui {
      display: flex; gap: 8px 14px; margin-bottom: 6px;
      font-size: clamp(0.72rem, 2.5vw, 0.85rem);
      align-items: center; flex-wrap: wrap; justify-content: center; width: 100%;
    }
    .stat { color: #adf; }
    .stat span { color: #fff; font-weight: bold; }
    .stat.stage-stat { color: #fa4; }
    #canvas {
      border: 2px solid #4af; cursor: crosshair; display: block;
      width: 100%; max-width: 792px; aspect-ratio: 792 / 660; touch-action: none;
    }
    #panel {
      display: flex; gap: 6px; margin-top: 8px;
      flex-wrap: wrap; justify-content: center; width: 100%; max-width: 792px;
    }
    .tower-btn {
      padding: 4px 8px; min-height: 34px; min-width: 50px;
      border: 2px solid #555; background: #222; color: #ccc;
      cursor: pointer; font-family: inherit;
      font-size: clamp(0.62rem, 1.8vw, 0.72rem);
      border-radius: 4px; transition: all 0.15s;
      flex: 1 1 auto; max-width: 110px; text-align: center;
    }
    .tower-btn:hover { border-color: #4af; color: #fff; }
    .tower-btn.selected { border-color: #4af; background: #1a3a5a; color: #4af; }
    .tower-btn .cost { color: #fa4; font-size: 0.6rem; display: block; margin-top: 1px; }
    .speed-btn {
      padding: 4px 10px; min-height: 30px;
      border: 2px solid #555; background: #222; color: #aaa;
      cursor: pointer; font-family: inherit;
      font-size: clamp(0.68rem, 2vw, 0.78rem);
      border-radius: 4px; transition: all 0.15s; white-space: nowrap;
    }
    .speed-btn:hover { border-color: #4af; color: #fff; }
    .speed-btn.active { border-color: #4fa; background: #1a3a2a; color: #4fa; }
    #msg {
      margin-top: 8px; font-size: clamp(0.8rem, 2.5vw, 1rem);
      color: #fa4; min-height: 1.4em; text-align: center;
    }
    #start-btn {
      padding: 8px 20px; min-height: 40px;
      border: 2px solid #4af; background: #1a3a5a; color: #4af;
      cursor: pointer; font-family: inherit;
      font-size: clamp(0.78rem, 2.5vw, 0.9rem);
      border-radius: 4px; transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #start-btn:hover { background: #2a5a8a; }
    #start-btn:disabled { opacity: 0.4; cursor: default; }
    #start-btn.countdown {
      border-color: #fa4; color: #fa4;
      animation: pulse-btn 1s ease-in-out infinite;
    }
    @keyframes pulse-btn {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }
    #tower-actions {
      display: flex; gap: 8px; margin-top: 6px; justify-content: center; flex-wrap: wrap;
    }
    .action-btn {
      padding: 4px 16px; min-height: 30px;
      border: 2px solid; background: #2a1010; color: #f44;
      border-color: #f44;
      cursor: pointer; font-family: inherit;
      font-size: clamp(0.68rem, 2vw, 0.78rem);
      border-radius: 4px; transition: all 0.15s; white-space: nowrap;
    }
    .action-btn.upgrade {
      border-color: #4fa; color: #4fa; background: #1a2a1a; min-width: 140px;
    }
    .action-btn.upgrade:disabled {
      opacity: 0.4; cursor: default;
    }
    .action-btn:hover:not(:disabled) { opacity: 0.8; }

    @media (min-width: 768px) {
      body { padding: 32px 40px; }

      #screen-select {
        min-height: calc(100dvh - 64px);
        justify-content: flex-start;
        gap: 24px;
      }

      .stage-section-title {
        font-size: 1.15rem;
        padding-bottom: 8px;
        margin-bottom: 14px;
      }
    }
  </style>
</head>
<body>

<!-- ── Stage Select ── -->
<div id="screen-select" class="screen active">
  <h2>Tiny Towers</h2>
  <div class="subtitle">Select a Stage</div>
  <div id="stage-cards"></div>
</div>

<!-- ── Result (Clear / Game Over) ── -->
<div id="screen-result" class="screen">
  <h2 id="result-title"></h2>
  <div class="result-info">Stage: <span id="result-stage-name"></span></div>
  <div class="result-info">Wave: <span id="result-wave"></span></div>
  <div class="result-info">Score: <span id="result-score"></span></div>
  <div class="result-btns">
    <button id="result-next-btn" class="result-btn green">Next Stage →</button>
    <button id="result-retry-btn" class="result-btn">Retry</button>
    <button id="result-select-btn" class="result-btn">Stage Select</button>
  </div>
</div>

<!-- ── Game ── -->
<div id="screen-game" class="screen">
  <h1>Tower Defense</h1>
  <div id="ui">
    <div class="stat stage-stat">Stage: <span id="stage-name-ui">-</span></div>
    <div class="stat">Wave: <span id="wave-num">1</span>/<span id="wave-total">10</span></div>
    <div class="stat">Lives: <span id="lives">20</span></div>
    <div class="stat">Gold: <span id="gold">150</span></div>
    <div class="stat">Score: <span id="score">0</span></div>
    <button id="start-btn">Start Wave</button>
    <button id="speed-btn" class="speed-btn">Speed: 1x</button>
  </div>
  <canvas id="canvas"></canvas>
  <div id="panel">
    <button class="tower-btn selected" data-type="basic">
      Basic<span class="cost">50G | DMG:12 SPD:1.1s</span>
    </button>
    <button class="tower-btn" data-type="sniper">
      Sniper<span class="cost">80G | DMG:50 RNG:4 Anti-Tank</span>
    </button>
    <button class="tower-btn" data-type="rapid">
      Rapid<span class="cost">70G | DMG:6 SPD:0.4s STUN</span>
    </button>
    <button class="tower-btn" data-type="slow">
      Freeze<span class="cost">60G | 3x AOE Slow RNG:3.5</span>
    </button>
    <button class="tower-btn" data-type="bomb">
      Bomb<span class="cost">100G | DMG:28 AOE Slow</span>
    </button>
  </div>
  <div id="tower-actions" style="display:none;">
    <button id="upgrade-btn" class="action-btn upgrade">Upgrade</button>
    <button id="abolish-btn" class="action-btn">Sell (50%)</button>
  </div>
  <div id="msg"></div>
</div>

// Active path — updated by loadStage()
let PATH = [];
let PATH_SET = new Set();

// ─── Progress (localStorage) ──────────────────────────────────────────
function getProgress() {
  try { return JSON.parse(localStorage.getItem('td_progress') || '{}'); } catch { return {}; }
}
function saveProgress(stageId, score, cleared) {
  const p = getProgress();
  if (!p[stageId] || p[stageId].score < score) {
    p[stageId] = { cleared, score };
  }
  if (cleared && stageId + 1 < STAGES.length) {
    p[stageId + 1] = p[stageId + 1] || { cleared: false, score: 0 };
  }
  localStorage.setItem('td_progress', JSON.stringify(p));
}
function isUnlocked(stageId) {
  if (stageId === 0) return true;
  return !!(getProgress()[stageId - 1]?.cleared);
}
function isCleared(stageId) { return !!(getProgress()[stageId]?.cleared); }
function getBestScore(stageId) { return getProgress()[stageId]?.score || 0; }

// ─── Screen management ────────────────────────────────────────────────
function showScreen(name) {
  ['screen-select', 'screen-game', 'screen-result'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === `screen-${name}`);
  });
}

// ─── Stage Select ─────────────────────────────────────────────────────
function renderStageSelect() {
  const container = document.getElementById('stage-cards');
  container.innerHTML = '';

  const groups = [];
  const groupMap = {};
  STAGES.forEach(stage => {
    if (!groupMap[stage.diffLabel]) {
      groupMap[stage.diffLabel] = [];
      groups.push({ label: stage.diffLabel, stages: groupMap[stage.diffLabel] });
    }
    groupMap[stage.diffLabel].push(stage);
  });

  groups.forEach((group, gi) => {
    const section = document.createElement('section');
    const title = document.createElement('h3');
    title.className = 'stage-section-title';
    title.textContent = group.label;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'stage-section-grid';

    group.stages.forEach(stage => {
      const unlocked = isUnlocked(stage.id);
      const cleared = isCleared(stage.id);
      const best = getBestScore(stage.id);
      const card = document.createElement('div');
      card.className = 'stage-card' + (cleared ? ' cleared' : '') + (unlocked ? '' : ' locked');
      card.innerHTML = `
        <div class="card-num">STAGE ${stage.id + 1}</div>
        <div class="card-icon">${unlocked ? stage.icon : '🔒'}</div>
        <div class="card-name">${stage.name}</div>
        <div class="card-meta">${stage.waves} Waves</div>
        ${cleared ? `<div class="card-best">★ ${best.toLocaleString()}</div>` : ''}
        ${!unlocked ? `<div class="card-lock-label">Clear previous stage</div>` : ''}
      `;
      if (unlocked) card.addEventListener('click', () => loadStage(stage.id));
      grid.appendChild(card);
    });

    if (gi === groups.length - 1) {
      const comingSoon = document.createElement('div');
      comingSoon.className = 'stage-card coming-soon';
      comingSoon.innerHTML = `
        <div class="card-num">NEXT</div>
        <div class="card-icon">✦</div>
        <div class="card-name">Coming Soon</div>
        <div class="card-meta">New stage<br>in preparation</div>
      `;
      grid.appendChild(comingSoon);
    }

    section.appendChild(grid);
    container.appendChild(section);
  });
}

// ─── Tower Definitions ────────────────────────────────────────────────
const MAX_TOWER_LEVEL = 3;

function getUpgradeCost(tower) {
  return TOWER_DEFS[tower.type].cost * tower.level;
}

function getEffectiveDef(tower) {
  const base = TOWER_DEFS[tower.type];
  const lv = tower.level - 1;
  return {
    ...base,
    dmg:        Math.round(base.dmg * Math.pow(1.5, lv)),
    range:      base.range * Math.pow(1.1, lv),
    fireRate:   Math.round(base.fireRate * Math.pow(0.85, lv)),
    maxTargets: base.maxTargets != null ? base.maxTargets + lv : undefined,
  };
}

const TOWER_DEFS = {
  basic:  { name:'Basic',  color:'#4af', cost:50,  dmg:12,  range:2.5, fireRate:1100, aoe:0 },
  sniper: { name:'Sniper', color:'#f84', cost:80,  dmg:50,  range:4,   fireRate:3500, aoe:0, targetMode:'tank' },
  rapid:  { name:'Rapid',  color:'#4fa', cost:70,  dmg:6,   range:2.5, fireRate:380,  aoe:0, slow:600 },
  slow:   { name:'Freeze', color:'#88f', cost:60,  dmg:4,   range:3.5, fireRate:1500, aoe:0, slow:2500, aoeFreeze:true, maxTargets:3 },
  bomb:   { name:'Bomb',   color:'#f44', cost:100, dmg:28,  range:3.2, fireRate:1800, aoe:1.5, slow:900 },
};

let state = {
  stageId: 0, gold: 150, lives: 20, score: 0,
  wave: 1, waveActive: false,
  towers: [], enemies: [], bullets: [], effects: [], particles: [],
  selectedType: 'basic', selectedTower: null,
  spawnQueue: [], spawnTimer: 0, bossReinforcementTimer: 0,
  hoverCell: null, countdown: 0, countdownActive: false, gameEnded: false,
  damageFlash: 0, screenShake: 0,
};

const startBtn = document.getElementById('start-btn');

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function spawnEnemy(type) {
  const stage = STAGES[state.stageId];
  const base = {
    basic:    { hp: 60,   spd: 1.2, color: '#f88', reward: 10,  size: 10, shape: 'circle'  },
    fast:     { hp: 30,   spd: 2.8, color: '#ff8', reward: 15,  size: 8,  shape: 'diamond' },
    tank:     { hp: 300,  spd: 0.6, color: '#a88', reward: 30,  size: 10, shape: 'square'  },
    specter:  { hp: 15,   spd: 11,  color: '#0ff', reward: 35,  size: 7,  shape: 'specter' },
    boss:     { hp: 12000, spd: 0.5, color: '#f4f', reward: 100, size: 13, shape: 'star'    },
    megaboss: { hp: 48000, spd: 0.3, color: '#ff6600', reward: 500, size: 20, shape: 'star', isMegaBoss: true },
  }[type] || { hp: 60, spd: 1.2, color: '#f88', reward: 10, size: 10, shape: 'circle' };
  const hardModeAssist = stage.diffLabel === 'Hard';
  const isBoss = type === 'boss' || type === 'megaboss';
  const bossHpMultiplier = isBoss ? (stage.bossHpMultiplier || 1) * (hardModeAssist ? 0.6 : 1) : 1;
  const hp = Math.round(base.hp * stage.difficulty * bossHpMultiplier);
  const speedMultiplier = stage.enemySpeedMultiplier || (hardModeAssist ? 0.8 : 1);
  const rewardMultiplier = stage.rewardMultiplier || (hardModeAssist ? 1.25 : 1);
  const start = PATH[0];
  return {
    ...base,
    hp,
    maxHp: hp,
    spd: base.spd * speedMultiplier,
    reward: Math.round(base.reward * rewardMultiplier),
    pathIdx: 0,
    x: start[0] * CELL + CELL / 2,
    y: start[1] * CELL + CELL / 2,
    slowTimer: 0,
    id: Math.random(),
  };
}

function buildWaveQueue(wave) {
  const stage = STAGES[state.stageId];
  const ew = wave + stage.waveOffset;
  const hardModeAssist = stage.diffLabel === 'Hard';
  const countMultiplier = stage.enemyCountMultiplier || (hardModeAssist ? 0.8 : 1);
  const count = Math.round((8 + ew * 3) * Math.sqrt(stage.difficulty) * countMultiplier);
  const q = [];
  for (let i = 0; i < count; i++) {
    let type = 'basic';
    if (ew >= 3 && Math.random() < 0.3) type = 'fast';
    if (ew >= 5 && Math.random() < 0.2) type = 'tank';
    if (ew >= (hardModeAssist ? 8 : 6) && Math.random() < (hardModeAssist ? 0.1 : 0.18)) type = 'specter';
    q.push({ type, delay: i * 1200 });
    if (ew >= (hardModeAssist ? 10 : 8) && Math.random() < (hardModeAssist ? 0.03 : 0.05)) {
      q.push({ type: 'boss', delay: i * 1200 + 600 });
    }
  }
  q.sort((a, b) => a.delay - b.delay);
  if (stage.bossStage && wave === stage.waves) {
    const bossWaveCountMultiplier = hardModeAssist ? 0.55 : countMultiplier;
    const rushCount = Math.round(30 * Math.sqrt(stage.difficulty) * bossWaveCountMultiplier);
    const rushBaseDelay = count * 1200 + 1000;
    for (let i = 0; i < rushCount; i++) {
      const r = Math.random();
      const type = r < 0.5 ? 'basic' : r < 0.8 ? 'fast' : 'tank';
      q.push({ type, delay: rushBaseDelay + i * 400 });
    }
    const megabossDelay = rushBaseDelay + rushCount * 400 + 2000;
    q.push({ type: 'megaboss', delay: megabossDelay });
    if (!stage.bossReinforcements) {
      const postCount = Math.round(60 * Math.sqrt(stage.difficulty) * bossWaveCountMultiplier);
      for (let i = 0; i < postCount; i++) {
        const r = Math.random();
        const type = r < 0.5 ? 'basic' : r < 0.8 ? 'fast' : 'tank';
        q.push({ type, delay: megabossDelay + 2000 + i * 600 });
      }
    }
  }
  return q;
}

function startWave() {
  if (state.waveActive || state.gameEnded) return;
  state.countdownActive = false;
  state.countdown = 0;
  state.waveActive = true;
  state.spawnQueue = buildWaveQueue(state.wave);
  state.spawnTimer = 0;
  state.bossReinforcementTimer = 0;
  startBtn.disabled = true;
  startBtn.textContent = 'Start Wave';
  startBtn.classList.remove('countdown');
  const stage = STAGES[state.stageId];
  if (stage.bossStage && state.wave === stage.waves) {
    setMsg('*** BOSS WAVE ***');
  } else {
    setMsg('');
  }
}

function setMsg(t) { document.getElementById('msg').textContent = t; }

function updateUI() {
  document.getElementById('wave-num').textContent = state.wave;
  document.getElementById('lives').textContent = state.lives;
  document.getElementById('gold').textContent = state.gold;
  document.getElementById('score').textContent = state.score;

  const t = state.selectedTower;
  towerActions.style.display = t ? 'flex' : 'none';
  if (t) {
    const def = getEffectiveDef(t);
    const canUpgrade = t.level < MAX_TOWER_LEVEL;
    if (canUpgrade) {
      const cost = getUpgradeCost(t);
      upgradeBtn.textContent = `Upgrade Lv.${t.level + 1} ${cost}G`;
      upgradeBtn.disabled = state.gold < cost;
    } else {
      upgradeBtn.textContent = 'Upgrade MAX';
      upgradeBtn.disabled = true;
    }
    setMsg(`${TOWER_DEFS[t.type].name} Lv.${t.level} | DMG:${def.dmg} RNG:${def.range.toFixed(1)} SPD:${(def.fireRate/1000).toFixed(2)}s`);
  }
}

  document.getElementById('result-select-btn').onclick = () => { renderStageSelect(); showScreen('select'); };

}

// ─── Input ────────────────────────────────────────────────────────────
upgradeBtn.addEventListener('click', () => {
  const t = state.selectedTower;
  if (!t || t.level >= MAX_TOWER_LEVEL) return;
  const cost = getUpgradeCost(t);
  if (state.gold < cost) return;
  state.gold -= cost;
  t.totalCost += cost;
  const oldRangePx = getEffectiveDef(t).range * CELL;
  t.level++;
  t.timer = 0;
  const newRangePx = getEffectiveDef(t).range * CELL;
  state.effects.push({
    x: t.cx, y: t.cy,
    r: oldRangePx, startR: oldRangePx, maxR: newRangePx,
    life: 600, maxLife: 600,
    color: TOWER_DEFS[t.type].color, type: 'upgrade',
  });
  updateUI();
});

abolishBtn.addEventListener('click', () => {
  if (!state.selectedTower) return;
  state.gold += Math.floor(state.selectedTower.totalCost * 0.5);
  state.towers = state.towers.filter(t => t !== state.selectedTower);
  state.selectedTower = null;
  updateUI();
});

function getCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    mx: (clientX - rect.left) * (W / rect.width),
    my: (clientY - rect.top) * (H / rect.height),
  };
}

function handleTap(clientX, clientY) {
  if (state.gameEnded) return;
  const { mx, my } = getCanvasCoords(clientX, clientY);
  const col = Math.floor(mx / CELL);
  const row = Math.floor(my / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  const existing = state.towers.find(t => t.col === col && t.row === row);
  if (existing) {
    state.selectedTower = (state.selectedTower === existing) ? null : existing;
    if (state.selectedTower) state.selectionAnimStart = lastTime;
    if (!state.selectedTower) setMsg('');
    updateUI();
    return;
  }
  state.selectedTower = null;
  setMsg('');
  updateUI();

  if (PATH_SET.has(`${col},${row}`)) return;
  const def = TOWER_DEFS[state.selectedType];
  if (state.gold < def.cost) { setMsg('Gold not enough!'); return; }
  state.gold -= def.cost;
  state.towers.push({
    col, row, type: state.selectedType,
    cx: col * CELL + CELL / 2,
    cy: row * CELL + CELL / 2,
    timer: 0, level: 1, totalCost: def.cost,
    animRange: def.range,
  });
  updateUI();
}

canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => {
  const { mx, my } = getCanvasCoords(e.clientX, e.clientY);
  const col = Math.floor(mx / CELL), row = Math.floor(my / CELL);
  state.hoverCell = { col, row };
  const onTower = state.towers.find(t => t.col === col && t.row === row);
  canvas.style.cursor = onTower ? 'pointer' : 'crosshair';
});
canvas.addEventListener('mouseleave', () => { state.hoverCell = null; canvas.style.cursor = 'crosshair'; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const { mx, my } = getCanvasCoords(t.clientX, t.clientY);
  state.hoverCell = { col: Math.floor(mx / CELL), row: Math.floor(my / CELL) };
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const { mx, my } = getCanvasCoords(t.clientX, t.clientY);
  state.hoverCell = { col: Math.floor(mx / CELL), row: Math.floor(my / CELL) };
}, { passive: false });

// ─── Shared AudioContext ──────────────────────────────────────────────
let _sharedAC = null;
function _getAC() {
  if (!_sharedAC) {
    try { _sharedAC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _sharedAC;
}

function resumeAudio() {
  const ac = _getAC();
  if (ac && ac.state === 'suspended') ac.resume().catch(() => {});
  return ac;
}

// ─── SFX ──────────────────────────────────────────────────────────────
const SFX = (() => {
  const T = {};
  function throttle(key, ms) {
    const now = performance.now();
    if ((now - (T[key] || 0)) < ms) return false;
    T[key] = now; return true;
  }
  function sweep(ac, t, f0, f1, dur, type, vol) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(f1, t + dur);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + dur + 0.01);
  }
  function noise(ac, t, dur, filtType, filtHz, vol) {
    const len = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource(), filt = ac.createBiquadFilter(), g = ac.createGain();
    src.buffer = buf; filt.type = filtType; filt.frequency.value = filtHz;
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(filt); filt.connect(g); g.connect(ac.destination);
    src.start(t); src.stop(t + dur + 0.01);
  }
  return {
    shoot(type) {
      const ac = resumeAudio(); if (!ac) return;
      if (type === 'rapid' && !throttle('shoot', 80)) return;
      const t = ac.currentTime;
      if      (type === 'rapid')  sweep(ac, t, 1100, 350, 0.035, 'square',   0.07);
      else if (type === 'sniper') sweep(ac, t, 2200, 400, 0.10,  'sawtooth', 0.14);
      else if (type === 'bomb')   sweep(ac, t,  180,  50, 0.18,  'sawtooth', 0.20);
      else if (type === 'slow')   noise(ac, t, 0.07, 'bandpass', 2800,       0.12);
      else                        sweep(ac, t,  750, 180, 0.09,  'square',   0.11);
    },
    enemyDie(shape, isMegaBoss) {
      const ac = resumeAudio(); if (!ac) return;
      const t = ac.currentTime;
      if (isMegaBoss) {
        sweep(ac, t, 120, 25, 0.5, 'sawtooth', 0.45);
        noise(ac, t, 0.45, 'lowpass', 600, 0.50);
        noise(ac, t + 0.05, 0.3, 'bandpass', 300, 0.35);
      } else if (shape === 'star') {
        sweep(ac, t, 300, 40, 0.30, 'sawtooth', 0.30);
        noise(ac, t, 0.28, 'lowpass', 900, 0.35);
      } else if (shape === 'square') {
        if (!throttle('die', 40)) return;
        sweep(ac, t, 220, 55, 0.14, 'sawtooth', 0.18);
        noise(ac, t, 0.12, 'lowpass', 500, 0.14);
      } else if (shape === 'specter') {
        sweep(ac, t, 900, 200, 0.14, 'sine', 0.13);
        noise(ac, t, 0.10, 'highpass', 5000, 0.09);
      } else {
        if (!throttle('die', 40)) return;
        sweep(ac, t, 380, 90, 0.10, 'sawtooth', 0.12);
      }
    },
    leak() {
      const ac = resumeAudio(); if (!ac) return;
      const t = ac.currentTime;
      sweep(ac, t, 240, 55, 0.40, 'sawtooth', 0.36);
      noise(ac, t, 0.38, 'lowpass', 450, 0.26);
    },
  };
})();

// ─── Game Loop ────────────────────────────────────────────────────────
let lastTime = 0;
let _lastCountdownSec = -1;

function loop(ts) {
  const rawDt = Math.min(ts - lastTime, 100);
  lastTime = ts;
  update(rawDt * gameSpeed, rawDt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt, rawDt) {
  if (state.gameEnded) return;

  if (state.countdownActive && !state.waveActive) {
    state.countdown -= dt;
    const secs = Math.max(0, Math.ceil(state.countdown / 1000));
    if (secs !== _lastCountdownSec) {
      _lastCountdownSec = secs;
      startBtn.textContent = `Start Wave ${secs}s`;
    }
    if (state.countdown <= 0) { state.countdownActive = false; startWave(); }
  }

  if (state.waveActive && state.spawnQueue.length > 0) {
    state.spawnTimer += dt;
    while (state.spawnQueue.length > 0 && state.spawnTimer >= state.spawnQueue[0].delay) {
      state.enemies.push(spawnEnemy(state.spawnQueue.shift().type));
    }
  }

  const stage = STAGES[state.stageId];
  const megaBossAlive = state.enemies.some(en => en.isMegaBoss && en.hp > 0);
  if (state.waveActive && stage.bossReinforcements && state.wave === stage.waves && megaBossAlive) {
    state.bossReinforcementTimer = Math.min(350, state.bossReinforcementTimer + dt);
    const activeMinions = state.enemies.filter(en => !en.isMegaBoss && en.shape !== 'star' && en.hp > 0).length;
    if (state.bossReinforcementTimer >= 350 && activeMinions < 40) {
      state.bossReinforcementTimer = 0;
      const r = Math.random();
      const type = r < 0.45 ? 'basic' : r < 0.78 ? 'fast' : r < 0.95 ? 'tank' : 'specter';
      state.enemies.push(spawnEnemy(type));
    }
  } else {
    state.bossReinforcementTimer = 0;
  }

  if (state.waveActive && state.spawnQueue.length === 0 && state.enemies.length === 0) {
    state.waveActive = false;
    if (state.wave >= stage.waves) {
      state.gameEnded = true;
      setTimeout(() => showResult(true), 800);
      return;
    }
    state.wave++;
    const bonus = 30 + state.wave * 5;
    state.gold += bonus;
    setMsg(`Wave ${state.wave - 1} cleared! +${bonus}G bonus`);
    startBtn.disabled = false;
    state.countdown = 10000;
    state.countdownActive = true;
    _lastCountdownSec = -1;
    startBtn.classList.add('countdown');
    updateUI();
  }

  state.enemies = state.enemies.filter(en => {
    const spd = en.slowTimer > 0 ? en.spd * 0.35 : en.spd;
    en.slowTimer = Math.max(0, en.slowTimer - dt);
    const target = PATH[en.pathIdx + 1];
    if (!target) {
      state.lives = Math.max(0, state.lives - 1);
      SFX.leak();

      // Goal explosion + damage feedback
      const gx = en.x, gy = en.y;
      state.effects.push({ x: gx, y: gy, r: 0, maxR: 18, life: 150, maxLife: 150, color: '#fff', type: 'explode' });
      state.effects.push({ x: gx, y: gy, r: 0, maxR: 55, life: 380, maxLife: 380, color: '#ff2200', type: 'explode' });
      state.effects.push({ x: gx, y: gy, r: 0, maxR: 38, life: 260, maxLife: 260, color: '#ff8800', type: 'explode' });
      const MAX_PARTICLES = 300;
      for (let i = 0; i < 30 && state.particles.length < MAX_PARTICLES; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 0.15 + Math.random() * 0.45;
        state.particles.push({
          x: gx, y: gy,
          vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
          r: 1.5 + Math.random() * 2.5,
          life: 200 + Math.random() * 250, maxLife: 450,
          color: ['#ff2200','#ff6600','#ff9900','#ffcc00','#fff'][Math.floor(Math.random() * 5)],
          gravity: 0.0003 + Math.random() * 0.0002,
        });
      }
      state.damageFlash = Math.min((state.damageFlash || 0) + 380, 700);
      state.screenShake = Math.min((state.screenShake || 0) + 180, 350);

      updateUI();
      if (state.lives <= 0 && !state.gameEnded) {
        state.gameEnded = true;
        setTimeout(() => showResult(false), 600);
      }
      return false;
    }
    const tx = target[0] * CELL + CELL / 2;
    const ty = target[1] * CELL + CELL / 2;
    const dx = tx - en.x, dy = ty - en.y;
    const d = Math.hypot(dx, dy);
    const move = spd * dt * 0.1;
    if (d <= move) { en.x = tx; en.y = ty; en.pathIdx++; }
    else { en.x += (dx / d) * move; en.y += (dy / d) * move; }
    return en.hp > 0;
  });

  state.towers.forEach(tower => {
    const targetRange = getEffectiveDef(tower).range;
    if (tower.animRange === undefined) tower.animRange = targetRange;
    const rangeDiff = targetRange - tower.animRange;
    if (Math.abs(rangeDiff) > 0.0005) tower.animRange += rangeDiff * Math.min(1, dt * 0.005);

    tower.timer += dt;
    const def = getEffectiveDef(tower);
    if (tower.timer < def.fireRate) return;
    const inRange = state.enemies.filter(en =>
      dist({ x: tower.cx, y: tower.cy }, en) <= def.range * CELL
    );
    if (inRange.length === 0) return;
    if (def.targetMode === 'tank') {
      inRange.sort((a, b) => b.hp - a.hp);
    } else {
      inRange.sort((a, b) => b.pathIdx - a.pathIdx);
    }
    const target = inRange[0];
    tower.timer = 0;
    if (def.aoeFreeze) {
      const freezeTargets = inRange.slice(0, def.maxTargets);
      freezeTargets.forEach(en => hitEnemy(en, def.dmg, def.slow));
      // no ring effect — rope visuals are drawn in render()
    } else if (def.aoe > 0) {
      state.bullets.push({
        x: tower.cx, y: tower.cy, tx: target.x, ty: target.y,
        spd: 4, dmg: def.dmg, aoe: def.aoe * CELL,
        color: def.color, r: 5, type: 'bomb', slow: def.slow || 0,
      });
    } else {
      state.bullets.push({
        x: tower.cx, y: tower.cy, target: target.id,
        spd: 7, dmg: def.dmg, aoe: 0,
        color: def.color, r: 3, type: 'direct', slow: def.slow || 0,
      });
    }
    SFX.shoot(tower.type);
  });

  state.bullets = state.bullets.filter(b => {
    if (b.type === 'direct') {
      const en = state.enemies.find(e => e.id === b.target);
      if (!en) return false;
      const dx = en.x - b.x, dy = en.y - b.y;
      const d = Math.hypot(dx, dy);
      if (d < b.spd * 2) { hitEnemy(en, b.dmg, b.slow); return false; }
      b.x += (dx / d) * b.spd * 2; b.y += (dy / d) * b.spd * 2;
      return true;
    } else {
      const dx = b.tx - b.x, dy = b.ty - b.y;
      const d = Math.hypot(dx, dy);
      if (d < b.spd * 2) {
        state.effects.push({ x: b.tx, y: b.ty, r: 0, maxR: b.aoe, life: 300, color: '#f84' });
        state.enemies.forEach(en => {
          if (Math.hypot(en.x - b.tx, en.y - b.ty) <= b.aoe) hitEnemy(en, b.dmg, b.slow);
        });
        return false;
      }
      b.x += (dx / d) * b.spd * 2; b.y += (dy / d) * b.spd * 2;
      return true;
    }
  });

  state.effects = state.effects.filter(ef => {
    if (ef.startR !== undefined) {
      const progress = 1 - ef.life / ef.maxLife;
      ef.r = ef.startR + (ef.maxR - ef.startR) * progress;
    } else {
      ef.r = Math.min(ef.maxR, ef.r + ef.maxR * (dt / 150));
    }
    ef.life -= dt;
    return ef.life > 0;
  });

  if (state.damageFlash > 0) state.damageFlash = Math.max(0, state.damageFlash - dt);
  if (state.screenShake > 0) state.screenShake = Math.max(0, state.screenShake - dt);

  const drag = Math.pow(0.99, dt / 16);
  state.particles = state.particles.filter(p => {
    p.px = p.x; p.py = p.y;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= drag;
    p.vy *= drag;
    p.vy += (p.gravity || 0.003) * dt;
    p.life -= dt;
    return p.life > 0;
  });

  state.enemies = state.enemies.filter(en => en.hp > 0);
}

function hitEnemy(en, dmg, slowMs) {
  en.hp -= dmg;
  if (slowMs) en.slowTimer = Math.max(en.slowTimer, slowMs);
  if (en.hp <= 0) {
    state.gold += en.reward;
    state.score += en.reward;
    SFX.enemyDie(en.shape, !!en.isMegaBoss);

    const isMegaBoss = !!en.isMegaBoss;
    const isBoss = en.shape === 'star' && !isMegaBoss;
    const isTank = en.shape === 'square';
    const pCount = isMegaBoss ? 200 : isBoss ? 100 : isTank ? 70 : 50;
    const sz = en.size;
    const MAX_PARTICLES = 300;

    state.effects.push({ x: en.x, y: en.y, r: 0, maxR: sz * 2.2, life: 160, maxLife: 160, color: '#fff', type: 'explode' });
    state.effects.push({ x: en.x, y: en.y, r: 0, maxR: sz * (isMegaBoss ? 12 : isBoss ? 6.5 : 3.8), life: 380, maxLife: 380, color: '#ff6600', type: 'explode' });
    if (isMegaBoss) {
      state.effects.push({ x: en.x, y: en.y, r: 0, maxR: sz * 9, life: 600, maxLife: 600, color: '#ffaa00', type: 'explode' });
    }

    const colorThemes = {
      circle:  ['#ff6600', '#ff8800', '#ffcc00', '#ff4400', '#ffee44'],
      diamond: ['#ffff55', '#ffffff', '#ccff44', '#88ffff', '#ffffaa'],
      square:  ['#4488ff', '#66aaff', '#44ccff', '#8844ff', '#cc88ff'],
      star:    ['#ff44ff', '#ff88ff', '#44ffff', '#ffff44', '#ff4444', '#44ff88', '#ffffff'],
    };
    const fireColors = colorThemes[en.shape] || colorThemes.circle;
    const scale = isMegaBoss ? 4 : isBoss ? 2.2 : 1;
    const innerCount = Math.floor(pCount * 0.3);
    const outerCount = pCount - innerCount;

    for (let i = 0; i < innerCount && state.particles.length < MAX_PARTICLES; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = (0.5 + Math.random() * 0.7) * scale;
      state.particles.push({
        x: en.x, y: en.y,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
        r: 1.5 + Math.random() * 1.0,
        life: 150 + Math.random() * 100, maxLife: 250,
        color: '#ffffff', gravity: 0.0002,
      });
    }
    for (let i = 0; i < outerCount && state.particles.length < MAX_PARTICLES; i++) {
      const angle = (i / outerCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      const spd = (0.3 + Math.random() * 0.6) * scale;
      state.particles.push({
        x: en.x, y: en.y,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
        r: 1.0 + Math.random() * 1.5,
        life: 250 + Math.random() * 250, maxLife: 500,
        color: fireColors[Math.floor(Math.random() * fireColors.length)],
        gravity: 0.0003 + Math.random() * 0.0003,
      });
    }

    updateUI();
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Screen shake
  const doShake = state.screenShake > 0;
  if (doShake) {
    const intensity = (state.screenShake / 350) * 7;
    ctx.save();
    ctx.translate(
      (Math.random() - 0.5) * intensity,
      (Math.random() - 0.5) * intensity
    );
  }

  const stage = STAGES[state.stageId];
  const cellCol = stage ? stage.cellColor : '#1a2a1a';
  const pathCol = stage ? stage.pathCellColor : '#2a3a2a';
  const pathLineCol = stage ? stage.pathLineColor : '#3a5a3a';

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = PATH_SET.has(`${c},${r}`) ? pathCol : cellCol;
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      ctx.strokeStyle = '#223';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  if (PATH.length === 0) return;

  ctx.strokeStyle = pathLineCol;
  ctx.lineWidth = 3;
  ctx.beginPath();
  PATH.forEach(([c, r], i) => {
    const x = c * CELL + CELL / 2, y = r * CELL + CELL / 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  const s = PATH[0], e = PATH[PATH.length - 1];
  ctx.fillStyle = '#4f8';
  ctx.beginPath(); ctx.arc(s[0]*CELL+CELL/2, s[1]*CELL+CELL/2, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f44';
  ctx.beginPath(); ctx.arc(e[0]*CELL+CELL/2, e[1]*CELL+CELL/2, 6, 0, Math.PI*2); ctx.fill();

  if (state.hoverCell && !state.gameEnded) {
    const { col, row } = state.hoverCell;
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
      const canPlace = !PATH_SET.has(`${col},${row}`) &&
                       !state.towers.find(t => t.col === col && t.row === row);
      if (canPlace) {
        const def = TOWER_DEFS[state.selectedType];
        const canAfford = state.gold >= def.cost;
        ctx.fillStyle = canAfford ? 'rgba(64,170,255,0.15)' : 'rgba(255,100,100,0.15)';
        ctx.fillRect(col * CELL, row * CELL, CELL, CELL);
        ctx.strokeStyle = canAfford ? 'rgba(64,170,255,0.3)' : 'rgba(255,100,100,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(col*CELL+CELL/2, row*CELL+CELL/2, def.range * CELL, 0, Math.PI*2);
        ctx.stroke();
      }
    }
  }

  if (state.selectedTower) {
    const t = state.selectedTower;
    const def = getEffectiveDef(t);
    const dispRange = (t.animRange !== undefined ? t.animRange : def.range) * CELL;
    const ANIM_DURATION = 350;
    const elapsed = lastTime - (state.selectionAnimStart || 0);
    const progress = Math.min(elapsed / ANIM_DURATION, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const animRange = dispRange * eased;
    ctx.save();
    ctx.globalAlpha = 0.2 * eased;
    ctx.fillStyle = def.color;
    ctx.beginPath(); ctx.arc(t.cx, t.cy, animRange, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.6 * eased;
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.lineDashOffset = -(lastTime / 40);
    ctx.beginPath(); ctx.arc(t.cx, t.cy, animRange, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
    ctx.restore();
  }

  state.towers.forEach(tower => {
    const def = getEffectiveDef(tower);
    const x = tower.cx, y = tower.cy;
    const hs = CELL * 0.38;
    // glow for upgraded towers
    if (tower.level > 1) {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = def.color;
      ctx.beginPath(); ctx.arc(x, y, hs * 0.85, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = def.color;
    ctx.beginPath(); ctx.arc(x, y, hs * 0.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, hs * 0.7, -Math.PI/2, -Math.PI/2 + Math.PI*2*Math.min(tower.timer/def.fireRate,1));
    ctx.stroke();
    // level stars
    if (tower.level > 1) {
      ctx.fillStyle = '#ffd700';
      ctx.font = `bold ${Math.round(CELL * 0.22)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('★'.repeat(tower.level - 1), x, y + hs * 0.6);
      ctx.textBaseline = 'alphabetic';
    }
  });

  // draw ropes from freeze towers to slowed enemies
  state.towers.filter(t => t.type === 'slow').forEach(tower => {
    const ropeRange = TOWER_DEFS.slow.range * CELL * 1.3;
    state.enemies.filter(en => en.slowTimer > 0).forEach(en => {
      if (Math.hypot(en.x - tower.cx, en.y - tower.cy) > ropeRange) return;
      const alpha = Math.min(0.85, en.slowTimer / 800);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#99f';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(tower.cx, tower.cy);
      ctx.lineTo(en.x, en.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    });
  });

  state.enemies.forEach(en => {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(en.x, en.y + en.size * 0.8, en.size * 0.7, en.size * 0.3, 0, 0, Math.PI*2);
    ctx.fill();

    if (en.isMegaBoss) {
      const pulse = 0.5 + 0.5 * Math.sin(lastTime / 200);
      ctx.save();
      ctx.globalAlpha = 0.22 + 0.12 * pulse;
      ctx.fillStyle = en.color;
      ctx.beginPath();
      ctx.arc(en.x, en.y, en.size * 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.5 + 0.3 * pulse;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(en.x, en.y, en.size * 1.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.fillStyle = en.slowTimer > 0 ? '#aaf' : en.color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;

    const shape = en.shape || 'circle';
    if (shape === 'diamond') {
      let angle = 0;
      const next = PATH[en.pathIdx + 1];
      if (next) {
        angle = Math.atan2(next[1] * CELL + CELL/2 - en.y, next[0] * CELL + CELL/2 - en.x) - Math.PI/2;
      }
      ctx.save();
      ctx.translate(en.x, en.y);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(0, -en.size);
      ctx.lineTo(en.size * 0.65, 0);
      ctx.lineTo(0, en.size);
      ctx.lineTo(-en.size * 0.65, 0);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if (shape === 'square') {
      const s = en.size * 0.9;
      ctx.beginPath();
      ctx.rect(en.x - s, en.y - s, s * 2, s * 2);
      ctx.fill(); ctx.stroke();
    } else if (shape === 'star') {
      const rot = (lastTime / 300) % (Math.PI * 2);
      ctx.save();
      ctx.translate(en.x, en.y);
      ctx.rotate(rot);
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const r = i % 2 === 0 ? en.size : en.size * 0.45;
        const a = (i * Math.PI / 5) - Math.PI / 2;
        if (i === 0) ctx.moveTo(r * Math.cos(a), r * Math.sin(a));
        else ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if (shape === 'specter') {
      let angle = 0;
      const nextPt = PATH[en.pathIdx + 1];
      if (nextPt) {
        angle = Math.atan2(nextPt[1] * CELL + CELL/2 - en.y, nextPt[0] * CELL + CELL/2 - en.x);
      }
      // outer glow halo
      ctx.save();
      ctx.globalAlpha = 0.25 + 0.1 * Math.sin(lastTime / 80);
      ctx.fillStyle = en.color;
      ctx.beginPath();
      ctx.arc(en.x, en.y, en.size * 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // speed trail lines behind
      if (nextPt) {
        const trailAngle = angle + Math.PI;
        ctx.save();
        ctx.strokeStyle = en.color;
        ctx.lineCap = 'round';
        for (let i = 0; i < 3; i++) {
          const offLen = (i + 1) * en.size * 0.8;
          const spread = (i - 1) * en.size * 0.35;
          ctx.globalAlpha = 0.5 - i * 0.12;
          ctx.lineWidth = 1.8 - i * 0.4;
          const sx = en.x + Math.cos(trailAngle) * offLen + Math.cos(angle + Math.PI/2) * spread;
          const sy = en.y + Math.sin(trailAngle) * offLen + Math.sin(angle + Math.PI/2) * spread;
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(sx + Math.cos(trailAngle) * en.size * 0.9, sy + Math.sin(trailAngle) * en.size * 0.9);
          ctx.stroke();
        }
        ctx.restore();
      }
      // arrow body
      ctx.save();
      ctx.translate(en.x, en.y);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(en.size * 1.3, 0);
      ctx.lineTo(-en.size * 0.9, -en.size * 0.8);
      ctx.lineTo(-en.size * 0.3, 0);
      ctx.lineTo(-en.size * 0.9, en.size * 0.8);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // bright tip
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.75;
      ctx.beginPath();
      ctx.arc(en.size * 0.65, 0, en.size * 0.22, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(en.x, en.y, en.size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    }

    if (en.slowTimer > 0) {
      const ropeAlpha = Math.min(0.9, en.slowTimer / 600);
      ctx.save();
      ctx.strokeStyle = '#66f';
      ctx.lineWidth = 1.8;
      ctx.globalAlpha = ropeAlpha;
      const r = en.size + 3;
      const segs = 5;
      for (let i = 0; i < segs; i++) {
        const a1 = (i / segs) * Math.PI * 2 - Math.PI / 2;
        const a2 = ((i + 0.55) / segs) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.arc(en.x, en.y, r, a1, a2);
        ctx.stroke();
      }
      ctx.restore();
    }

    const bw = en.size * 2.2, bh = 4;
    const bx = en.x - bw / 2, by = en.y - en.size - 7;
    ctx.fillStyle = '#400'; ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = en.hp/en.maxHp > 0.5 ? '#4f4' : en.hp/en.maxHp > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(bx, by, bw * (en.hp / en.maxHp), bh);

    if (en.isMegaBoss) {
      ctx.save();
      ctx.fillStyle = '#ff6600';
      ctx.font = `bold ${Math.round(CELL * 0.27)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('BOSS', en.x, by - 1);
      ctx.restore();
    }
    if (en.shape === 'specter') {
      ctx.save();
      ctx.fillStyle = '#0ff';
      ctx.font = `bold ${Math.round(CELL * 0.22)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('FAST', en.x, by - 1);
      ctx.restore();
    }
  });

  state.bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  });

  state.effects.forEach(ef => {
    const lifeMax = ef.maxLife || 300;
    let alpha;
    const progress = 1 - ef.life / lifeMax;
    if (ef.type === 'upgrade') {
      alpha = Math.sin(Math.PI * progress);
    } else if (ef.type === 'explode') {
      alpha = ef.life / lifeMax;
      ctx.save();
      ctx.globalAlpha = alpha * 0.25;
      ctx.fillStyle = ef.color;
      ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    } else {
      alpha = ef.life / 300;
    }
    ctx.save();
    ctx.globalAlpha = Math.min(1, alpha);
    ctx.strokeStyle = ef.color;
    ctx.lineWidth = ef.type === 'upgrade' ? 3 : ef.type === 'explode' ? 2.5 : 2;
    ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  ctx.save();
  ctx.lineCap = 'round';
  state.particles.forEach(p => {
    const t = p.life / p.maxLife;
    ctx.globalAlpha = t < 0.2 ? t / 0.2 : t;
    ctx.strokeStyle = p.color;
    ctx.lineWidth = p.r * 2;
    ctx.beginPath();
    ctx.moveTo(p.px ?? p.x, p.py ?? p.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  });
  ctx.restore();

  // Damage flash overlay
  if (state.damageFlash > 0) {
    const flashAlpha = Math.min(state.damageFlash / 380, 1) * 0.48;
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(0, 0, W, H);
    // Vignette-like edge highlight
    const grad = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
    grad.addColorStop(0, 'rgba(255,0,0,0)');
    grad.addColorStop(1, `rgba(255,0,0,${flashAlpha * 0.8})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  if (doShake) ctx.restore();

  if (state.gameEnded) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 40px Courier New';
    ctx.fillStyle = state.lives <= 0 ? '#f44' : '#4fa';
    ctx.fillText(state.lives <= 0 ? 'GAME OVER' : 'STAGE CLEAR!', W/2, H/2);
  }
}

// ─── Init ─────────────────────────────────────────────────────────────
renderStageSelect();
requestAnimationFrame(loop);
</script>
</body>
</html>
