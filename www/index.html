<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tower Defense</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      font-family: 'Courier New', monospace;
      color: #fff;
      padding: 8px;
      overflow-x: hidden;
    }
    h1 {
      font-size: clamp(0.9rem, 3vw, 1.4rem);
      letter-spacing: clamp(1px, 1vw, 4px);
      color: #4af;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    #ui {
      display: flex;
      gap: 8px 14px;
      margin-bottom: 6px;
      font-size: clamp(0.72rem, 2.5vw, 0.85rem);
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .stat { color: #adf; }
    .stat span { color: #fff; font-weight: bold; }
    #canvas {
      border: 2px solid #4af;
      cursor: crosshair;
      display: block;
      width: 100%;
      max-width: 792px;
      aspect-ratio: 792 / 660;
      touch-action: none;
    }
    #panel {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 792px;
    }
    .tower-btn {
      padding: 4px 8px;
      min-height: 34px;
      min-width: 50px;
      border: 2px solid #555;
      background: #222;
      color: #ccc;
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(0.62rem, 1.8vw, 0.72rem);
      border-radius: 4px;
      transition: all 0.15s;
      flex: 1 1 auto;
      max-width: 110px;
      text-align: center;
    }
    .tower-btn:hover { border-color: #4af; color: #fff; }
    .tower-btn.selected { border-color: #4af; background: #1a3a5a; color: #4af; }
    .tower-btn .cost { color: #fa4; font-size: 0.6rem; display: block; margin-top: 1px; }
    .speed-btn {
      padding: 4px 10px;
      min-height: 30px;
      border: 2px solid #555;
      background: #222;
      color: #aaa;
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(0.68rem, 2vw, 0.78rem);
      border-radius: 4px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .speed-btn:hover { border-color: #4af; color: #fff; }
    .speed-btn.active { border-color: #4fa; background: #1a3a2a; color: #4fa; }
    #msg {
      margin-top: 8px;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      color: #fa4;
      min-height: 1.4em;
      text-align: center;
    }
    #start-btn {
      padding: 8px 20px;
      min-height: 40px;
      border: 2px solid #4af;
      background: #1a3a5a;
      color: #4af;
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(0.78rem, 2.5vw, 0.9rem);
      border-radius: 4px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #start-btn:hover { background: #2a5a8a; }
    #start-btn:disabled { opacity: 0.4; cursor: default; }
    #start-btn.countdown {
      border-color: #fa4;
      color: #fa4;
      animation: pulse-btn 1s ease-in-out infinite;
    }
    @keyframes pulse-btn {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }
  </style>
</head>
<body>
<h1>Tower Defense</h1>
<div id="ui">
  <div class="stat">Wave: <span id="wave-num">1</span></div>
  <div class="stat">Lives: <span id="lives">20</span></div>
  <div class="stat">Gold: <span id="gold">150</span></div>
  <div class="stat">Score: <span id="score">0</span></div>
  <button id="start-btn">Start Wave</button>
  <button id="speed-btn" class="speed-btn">Speed: 1x</button>
</div>
<canvas id="canvas"></canvas>
<div id="panel">
  <button class="tower-btn selected" data-type="basic">
    Basic<span class="cost">50G | DMG:10 SPD:1.2s</span>
  </button>
  <button class="tower-btn" data-type="sniper">
    Sniper<span class="cost">80G | DMG:40 SPD:3s</span>
  </button>
  <button class="tower-btn" data-type="rapid">
    Rapid<span class="cost">70G | DMG:5 SPD:0.4s</span>
  </button>
  <button class="tower-btn" data-type="slow">
    Freeze<span class="cost">60G | DMG:3 SLOW</span>
  </button>
  <button class="tower-btn" data-type="bomb">
    Bomb<span class="cost">100G | DMG:30 AOE</span>
  </button>
</div>
<button id="abolish-btn" style="display:none;margin-top:6px;padding:4px 16px;min-height:30px;border:2px solid #f44;background:#2a1010;color:#f44;cursor:pointer;font-family:inherit;font-size:clamp(0.68rem,2vw,0.78rem);border-radius:4px;">廃止 (50%返金)</button>
<div id="msg"></div>

<script>
const CELL = 44;
const COLS = 18;
const ROWS = 15;
const W = CELL * COLS;  // 792
const H = CELL * ROWS;  // 660

const canvas = document.getElementById('canvas');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// Path definition (col, row) — redesigned for 18×15 grid
const PATH = [
  [0,2],[1,2],[2,2],[3,2],[3,3],[3,4],[3,5],[3,6],[3,7],
  [4,7],[5,7],[6,7],[7,7],[7,6],[7,5],[7,4],[7,3],[7,2],[7,1],[7,0],
  [8,0],[9,0],[10,0],[11,0],[11,1],[11,2],[11,3],[11,4],[11,5],[11,6],[11,7],[11,8],[11,9],[11,10],
  [10,10],[9,10],[8,10],[7,10],[6,10],[5,10],[4,10],[4,11],[4,12],[4,13],[4,14],
  [5,14],[6,14],[7,14],[8,14],[9,14],[10,14],[11,14],[12,14],[13,14],[14,14],
  [14,13],[14,12],[14,11],[14,10],[14,9],[14,8],[14,7],[14,6],[14,5],[14,4],[14,3],[14,2],[14,1],
  [15,1],[16,1],[17,1]
];

const PATH_SET = new Set(PATH.map(([c,r]) => `${c},${r}`));

const TOWER_DEFS = {
  basic:  { name:'Basic',  color:'#4af', cost:50,  dmg:10,  range:2.5, fireRate:1200, aoe:0 },
  sniper: { name:'Sniper', color:'#f84', cost:80,  dmg:40,  range:5,   fireRate:3000, aoe:0 },
  rapid:  { name:'Rapid',  color:'#4fa', cost:70,  dmg:5,   range:2,   fireRate:400,  aoe:0 },
  slow:   { name:'Freeze', color:'#88f', cost:60,  dmg:3,   range:2.5, fireRate:1000, aoe:0, slow:0.4 },
  bomb:   { name:'Bomb',   color:'#f44', cost:100, dmg:30,  range:3,   fireRate:2000, aoe:1.2 },
};

let gameSpeed = 1;

let state = {
  gold: 150, lives: 20, score: 0,
  wave: 1, waveActive: false,
  towers: [], enemies: [], bullets: [], effects: [],
  selectedType: 'basic',
  selectedTower: null,      // tower whose range is being displayed
  spawnQueue: [], spawnTimer: 0,
  hoverCell: null,
  countdown: 0,             // ms until auto wave start (real-time)
  countdownActive: false,
};

const startBtn = document.getElementById('start-btn');

function cellCenter(c, r) {
  return { x: c * CELL + CELL / 2, y: r * CELL + CELL / 2 };
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function spawnEnemy(type) {
  const types = {
    basic:  { hp: 60,  spd: 1.2, color: '#f88', reward: 10, size: 10 },
    fast:   { hp: 30,  spd: 2.8, color: '#ff8', reward: 15, size: 8  },
    tank:   { hp: 300, spd: 0.6, color: '#a88', reward: 30, size: 14 },
    boss:   { hp: 1000,spd: 0.5, color: '#f4f', reward: 100,size: 18 },
  };
  const def = types[type] || types.basic;
  const start = PATH[0];
  return {
    ...def,
    maxHp: def.hp,
    pathIdx: 0,
    x: start[0] * CELL + CELL / 2,
    y: start[1] * CELL + CELL / 2,
    slowTimer: 0,
    id: Math.random(),
  };
}

function buildWaveQueue(wave) {
  const q = [];
  const count = 8 + wave * 3;
  for (let i = 0; i < count; i++) {
    let type = 'basic';
    if (wave >= 3 && Math.random() < 0.3) type = 'fast';
    if (wave >= 5 && Math.random() < 0.2) type = 'tank';
    if (wave >= 8 && Math.random() < 0.05) type = 'boss';
    q.push({ type, delay: i * 1200 });
  }
  return q;
}

function startWave() {
  if (state.waveActive) return;
  state.countdownActive = false;
  state.countdown = 0;
  state.waveActive = true;
  state.spawnQueue = buildWaveQueue(state.wave);
  state.spawnTimer = 0;
  startBtn.disabled = true;
  startBtn.textContent = 'Start Wave';
  startBtn.classList.remove('countdown');
  setMsg('');
}

function setMsg(t) { document.getElementById('msg').textContent = t; }
const abolishBtn = document.getElementById('abolish-btn');

function updateUI() {
  document.getElementById('wave-num').textContent = state.wave;
  document.getElementById('lives').textContent = state.lives;
  document.getElementById('gold').textContent = state.gold;
  document.getElementById('score').textContent = state.score;
  abolishBtn.style.display = state.selectedTower ? 'inline-block' : 'none';
}

abolishBtn.addEventListener('click', () => {
  if (!state.selectedTower) return;
  const def = TOWER_DEFS[state.selectedTower.type];
  state.gold += Math.floor(def.cost * 0.5);
  state.towers = state.towers.filter(t => t !== state.selectedTower);
  state.selectedTower = null;
  updateUI();
});

function getCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  return {
    mx: (clientX - rect.left) * sx,
    my: (clientY - rect.top) * sy,
  };
}

function handleTap(clientX, clientY) {
  const { mx, my } = getCanvasCoords(clientX, clientY);
  const col = Math.floor(mx / CELL);
  const row = Math.floor(my / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  // Tap on existing tower → toggle range display
  const existing = state.towers.find(t => t.col === col && t.row === row);
  if (existing) {
    state.selectedTower = (state.selectedTower === existing) ? null : existing;
    updateUI();
    return;
  }

  // Tap elsewhere → deselect tower
  state.selectedTower = null;
  updateUI();

  // Try to place a new tower
  if (PATH_SET.has(`${col},${row}`)) return;
  const def = TOWER_DEFS[state.selectedType];
  if (state.gold < def.cost) { setMsg('Gold not enough!'); return; }
  state.gold -= def.cost;
  state.towers.push({
    col, row, type: state.selectedType,
    cx: col * CELL + CELL / 2,
    cy: row * CELL + CELL / 2,
    timer: 0,
  });
  updateUI();
}

// Mouse events
canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));

canvas.addEventListener('mousemove', e => {
  const { mx, my } = getCanvasCoords(e.clientX, e.clientY);
  state.hoverCell = { col: Math.floor(mx / CELL), row: Math.floor(my / CELL) };
});
canvas.addEventListener('mouseleave', () => { state.hoverCell = null; });

// Touch events
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const { mx, my } = getCanvasCoords(touch.clientX, touch.clientY);
  state.hoverCell = { col: Math.floor(mx / CELL), row: Math.floor(my / CELL) };
  handleTap(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const { mx, my } = getCanvasCoords(touch.clientX, touch.clientY);
  state.hoverCell = { col: Math.floor(mx / CELL), row: Math.floor(my / CELL) };
}, { passive: false });

canvas.addEventListener('touchend', () => { state.hoverCell = null; });

document.querySelectorAll('.tower-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.selectedType = btn.dataset.type;
  });
});

startBtn.addEventListener('click', startWave);

const SPEEDS = [1, 2, 3];
let speedIdx = 0;
const speedBtn = document.getElementById('speed-btn');
speedBtn.addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  gameSpeed = SPEEDS[speedIdx];
  speedBtn.textContent = `Speed: ${gameSpeed}x`;
  speedBtn.classList.toggle('active', gameSpeed > 1);
});

// Game loop — rawDt is wall-clock ms, dt is game-speed-scaled ms
let lastTime = 0;
function loop(ts) {
  const rawDt = Math.min(ts - lastTime, 100);
  const dt = rawDt * gameSpeed;
  lastTime = ts;
  update(dt, rawDt);
  draw();
  requestAnimationFrame(loop);
}

let _lastCountdownSec = -1;

function update(dt, rawDt) {
  if (state.lives <= 0) return;

  // Countdown timer runs in real-time, independent of game speed
  if (state.countdownActive && !state.waveActive) {
    state.countdown -= rawDt;
    const secs = Math.max(0, Math.ceil(state.countdown / 1000));
    if (secs !== _lastCountdownSec) {
      _lastCountdownSec = secs;
      startBtn.textContent = `Start Wave (${secs}s)`;
    }
    if (state.countdown <= 0) {
      state.countdownActive = false;
      startWave();
    }
  }

  // Spawn enemies
  if (state.waveActive && state.spawnQueue.length > 0) {
    state.spawnTimer += dt;
    while (state.spawnQueue.length > 0 && state.spawnTimer >= state.spawnQueue[0].delay) {
      state.enemies.push(spawnEnemy(state.spawnQueue.shift().type));
    }
  }

  // Check wave end
  if (state.waveActive && state.spawnQueue.length === 0 && state.enemies.length === 0) {
    state.waveActive = false;
    state.wave++;
    const bonus = 30 + state.wave * 5;
    state.gold += bonus;
    setMsg(`Wave ${state.wave - 1} cleared! +${bonus}G bonus`);
    startBtn.disabled = false;
    // Start countdown for next wave
    state.countdown = 15000;
    state.countdownActive = true;
    _lastCountdownSec = -1;
    startBtn.classList.add('countdown');
    updateUI();
  }

  // Move enemies
  state.enemies = state.enemies.filter(en => {
    const spd = en.slowTimer > 0 ? en.spd * 0.35 : en.spd;
    en.slowTimer = Math.max(0, en.slowTimer - dt);

    const target = PATH[en.pathIdx + 1];
    if (!target) {
      state.lives = Math.max(0, state.lives - 1);
      updateUI();
      if (state.lives <= 0) { setMsg('GAME OVER'); }
      return false;
    }
    const tx = target[0] * CELL + CELL / 2;
    const ty = target[1] * CELL + CELL / 2;
    const dx = tx - en.x, dy = ty - en.y;
    const d = Math.hypot(dx, dy);
    const move = spd * dt * 0.1;
    if (d <= move) {
      en.x = tx; en.y = ty;
      en.pathIdx++;
    } else {
      en.x += (dx / d) * move;
      en.y += (dy / d) * move;
    }
    return en.hp > 0;
  });

  // Tower fire
  state.towers.forEach(tower => {
    tower.timer += dt;
    const def = TOWER_DEFS[tower.type];
    if (tower.timer < def.fireRate) return;

    const inRange = state.enemies.filter(en =>
      dist({ x: tower.cx, y: tower.cy }, en) <= def.range * CELL
    );
    if (inRange.length === 0) return;
    inRange.sort((a, b) => b.pathIdx - a.pathIdx);
    const target = inRange[0];
    tower.timer = 0;

    if (def.aoe > 0) {
      state.bullets.push({
        x: tower.cx, y: tower.cy,
        tx: target.x, ty: target.y,
        spd: 4, dmg: def.dmg, aoe: def.aoe * CELL,
        color: def.color, r: 5, type: 'bomb',
        slow: def.slow || 0,
      });
    } else {
      state.bullets.push({
        x: tower.cx, y: tower.cy,
        target: target.id,
        spd: 7, dmg: def.dmg, aoe: 0,
        color: def.color, r: 3, type: 'direct',
        slow: def.slow || 0,
      });
    }
  });

  // Move bullets
  state.bullets = state.bullets.filter(b => {
    if (b.type === 'direct') {
      const en = state.enemies.find(e => e.id === b.target);
      if (!en) return false;
      const dx = en.x - b.x, dy = en.y - b.y;
      const d = Math.hypot(dx, dy);
      if (d < b.spd * 2) {
        hitEnemy(en, b.dmg, b.slow);
        return false;
      }
      b.x += (dx / d) * b.spd * 2;
      b.y += (dy / d) * b.spd * 2;
      return true;
    } else {
      const dx = b.tx - b.x, dy = b.ty - b.y;
      const d = Math.hypot(dx, dy);
      if (d < b.spd * 2) {
        state.effects.push({ x: b.tx, y: b.ty, r: 0, maxR: b.aoe, life: 300, color: '#f84' });
        state.enemies.forEach(en => {
          if (Math.hypot(en.x - b.tx, en.y - b.ty) <= b.aoe) {
            hitEnemy(en, b.dmg, b.slow);
          }
        });
        return false;
      }
      b.x += (dx / d) * b.spd * 2;
      b.y += (dy / d) * b.spd * 2;
      return true;
    }
  });

  // Effects
  state.effects = state.effects.filter(ef => {
    ef.r = Math.min(ef.maxR, ef.r + ef.maxR * (dt / 150));
    ef.life -= dt;
    return ef.life > 0;
  });

  state.enemies = state.enemies.filter(en => en.hp > 0);
}

function hitEnemy(en, dmg, slow) {
  en.hp -= dmg;
  if (slow) en.slowTimer = 2000;
  if (en.hp <= 0) {
    state.gold += en.reward;
    state.score += en.reward;
    state.effects.push({ x: en.x, y: en.y, r: 0, maxR: 20, life: 200, color: '#ff8' });
    updateUI();
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const key = `${c},${r}`;
      ctx.fillStyle = PATH_SET.has(key) ? '#2a3a2a' : '#1a2a1a';
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      ctx.strokeStyle = '#223';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  // Path line
  ctx.strokeStyle = '#3a5a3a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  PATH.forEach(([c,r], i) => {
    const x = c * CELL + CELL / 2;
    const y = r * CELL + CELL / 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Start / End markers
  const s = PATH[0], e = PATH[PATH.length - 1];
  ctx.fillStyle = '#4f8';
  ctx.beginPath();
  ctx.arc(s[0]*CELL+CELL/2, s[1]*CELL+CELL/2, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#f44';
  ctx.beginPath();
  ctx.arc(e[0]*CELL+CELL/2, e[1]*CELL+CELL/2, 6, 0, Math.PI*2);
  ctx.fill();

  // Hover preview
  if (state.hoverCell) {
    const { col, row } = state.hoverCell;
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
      const canPlace = !PATH_SET.has(`${col},${row}`) &&
                       !state.towers.find(t => t.col === col && t.row === row);
      const def = TOWER_DEFS[state.selectedType];
      const canAfford = state.gold >= def.cost;
      if (canPlace) {
        ctx.fillStyle = canAfford ? 'rgba(64,170,255,0.15)' : 'rgba(255,100,100,0.15)';
        ctx.fillRect(col * CELL, row * CELL, CELL, CELL);
        ctx.strokeStyle = canAfford ? 'rgba(64,170,255,0.3)' : 'rgba(255,100,100,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(col*CELL+CELL/2, row*CELL+CELL/2, def.range * CELL, 0, Math.PI*2);
        ctx.stroke();
      }
    }
  }

  // Selected tower range (drawn before towers so tower renders on top)
  if (state.selectedTower) {
    const t = state.selectedTower;
    const def = TOWER_DEFS[t.type];
    ctx.save();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(t.cx, t.cy, def.range * CELL, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.beginPath();
    ctx.arc(t.cx, t.cy, def.range * CELL, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Towers
  state.towers.forEach(tower => {
    const def = TOWER_DEFS[tower.type];
    const isSelected = tower === state.selectedTower;
    const x = tower.cx, y = tower.cy;
    const hs = CELL * 0.38;

    ctx.fillStyle = '#334';
    ctx.fillRect(x - hs, y - hs, hs*2, hs*2);
    ctx.strokeStyle = isSelected ? '#fff' : def.color;
    ctx.lineWidth = isSelected ? 3 : 2;
    ctx.strokeRect(x - hs, y - hs, hs*2, hs*2);

    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(x, y, hs * 0.5, 0, Math.PI*2);
    ctx.fill();

    const progress = Math.min(tower.timer / def.fireRate, 1);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, hs * 0.7, -Math.PI/2, -Math.PI/2 + Math.PI*2*progress);
    ctx.stroke();
  });

  // Enemies
  state.enemies.forEach(en => {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(en.x, en.y + en.size * 0.8, en.size * 0.7, en.size * 0.3, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = en.slowTimer > 0 ? '#aaf' : en.color;
    ctx.beginPath();
    ctx.arc(en.x, en.y, en.size, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();

    const bw = en.size * 2.2;
    const bh = 4;
    const bx = en.x - bw / 2;
    const by = en.y - en.size - 7;
    ctx.fillStyle = '#400';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = en.hp / en.maxHp > 0.5 ? '#4f4' : en.hp / en.maxHp > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(bx, by, bw * (en.hp / en.maxHp), bh);
  });

  // Bullets
  state.bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
  });

  // Effects
  state.effects.forEach(ef => {
    const alpha = ef.life / 300;
    ctx.strokeStyle = ef.color + Math.floor(alpha * 255).toString(16).padStart(2,'0');
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI*2);
    ctx.stroke();
  });

  // Game over overlay
  if (state.lives <= 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f44';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    ctx.fillStyle = '#adf';
    ctx.font = '24px Courier New';
    ctx.fillText(`Score: ${state.score}`, W/2, H/2 + 20);
    ctx.fillStyle = '#888';
    ctx.font = '16px Courier New';
    ctx.fillText('Reload to retry', W/2, H/2 + 55);
  }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
